                window.unsubscribes.push(onSnapshot(collection(db, ...basePath, 'categories'), snap => {
                    if(!snap.empty) {
                        const cloudCats = [];
                        snap.forEach(doc => cloudCats.push(doc.data()));
                        cloudCats.sort((a,b) => (a.order || 0) - (b.order || 0));
                        window.categories = cloudCats;
                        localStorage.setItem('binbar_categories_v1', JSON.stringify(window.categories));
                        window.renderFilters();
                        window.renderCategoryEditorList();
                    } else {
                        window.categories.forEach(c => setDoc(doc(db, ...basePath, 'categories', c.id.toString()), c).catch(e=>console.warn(e)));
                    }
                }, err => console.warn("Sync error:", err)));

                // 2. 同步「酒單」
                window.unsubscribes.push(onSnapshot(collection(db, ...basePath, 'drinks'), snap => {
                    if(!snap.empty) {
                        const cloudDrinks = [];
                        snap.forEach(doc => cloudDrinks.push(doc.data()));
                        window.drinks = cloudDrinks;
                        localStorage.setItem('binbar_data_v1', JSON.stringify(window.drinks));
                        window.renderDrinks();
                    } else {
                        window.drinks.forEach(d => setDoc(doc(db, ...basePath, 'drinks', d.id.toString()), d).catch(e=>console.warn(e)));
                    }
                }, err => console.warn("Sync error:", err)));

                // 3. 同步「訂單」
                window.unsubscribes.push(onSnapshot(collection(db, ...basePath, 'orders'), snap => {
                    const cloudOrders = [];
                    snap.forEach(doc => cloudOrders.push(doc.data()));
                    cloudOrders.sort((a, b) => a.ts - b.ts);
                    window.orders = cloudOrders;
                    localStorage.setItem('binbar_orders_v1', JSON.stringify(window.orders));
                    window.renderOrdersList();
                    window.updateOrderBadges();
                }, err => console.warn("Sync error:", err)));

                // 4. 同步「已解鎖紀錄」
                window.unsubscribes.push(onSnapshot(doc(db, ...basePath, 'meta', 'info'), docSnap => {
                    if (docSnap.exists() && docSnap.data().madeDrinks) {
                        window.madeDrinks = docSnap.data().madeDrinks;
                        localStorage.setItem('binbar_made_v1', JSON.stringify(window.madeDrinks));
                        window.renderDrinks();
                    } else {
                        setDoc(doc(db, ...basePath, 'meta', 'info'), { madeDrinks: window.madeDrinks }).catch(e=>console.warn(e));
                    }
                }, err => console.warn("Sync error:", err)));

                window.showToast("雲端同步已連線 ☁️");

            } catch (e) {
                console.warn("Cloud Sync disabled or failed:", e);
                window.isCloudConnected = false;
                
                if (iconBase) {
                    iconBase.classList.remove('text-gray-400', 'text-green-400');
                    iconBase.classList.add('text-red-500');
                }
                if (indicator) indicator.classList.add('hidden');
                
                if (e.code === 'auth/configuration-not-found' || e.code === 'auth/operation-not-allowed' || (e.message && e.message.includes('configuration-not-found'))) {
                    window.showToast("設定提醒：請至 Firebase 控制台啟用「匿名登入 (Anonymous)」以開啟雲端功能！", 6000);
                } else {
                    window.showToast("雲端連線失敗，目前為單機模式。", 4000);
                }
            }
        };

        window.openBackupModal = () => {
            const m = document.getElementById('backup-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
        };

        window.closeBackupModal = () => {
            const m = document.getElementById('backup-modal');
            m.classList.add('opacity-0');
            setTimeout(() => m.classList.add('hidden'), 300);
        };

        window.exportData = () => {
            const backup = {
                drinks: window.drinks,
                categories: window.categories,
                madeDrinks: window.madeDrinks
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            const date = new Date().toISOString().split('T')[0];
            downloadAnchorNode.setAttribute("download", `binbar_backup_${date}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            window.showToast("✅ 匯出成功！");
            window.closeBackupModal();
        };

        window.importData = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.drinks && Array.isArray(imported.drinks)) {
                        const res = await window.customConfirm("⚠️ 警告：匯入將會完全覆蓋當前所有的酒單與分類！確定要繼續嗎？");
                        if (res) {
                            window.drinks = imported.drinks;
                            if (imported.categories) window.categories = imported.categories;
                            if (imported.madeDrinks) window.madeDrinks = imported.madeDrinks;
                            
                            window.saveData();
                            window.saveCategories();
                            window.saveMadeDrinks();
                            
                            if (window.isCloudConnected) {
                                window.showToast("正在覆寫雲端資料...");
                                for(const d of window.drinks) await setDoc(doc(db, ...basePath, 'drinks', d.id.toString()), d);
                                for(const c of window.categories) await setDoc(doc(db, ...basePath, 'categories', c.id.toString()), c);
                                await setDoc(doc(db, ...basePath, 'meta', 'info'), { madeDrinks: window.madeDrinks });
                            }
                            
                            window.renderFilters();
                            window.renderDrinks();
                            window.closeBackupModal();
                            window.showToast("✅ 匯入成功！");
                        }
                    } else {
                        window.customAlert("❌ 檔案格式不正確或損毀！");
                    }
                } catch (err) {
                    console.error(err);
                    window.customAlert("❌ 讀取檔案失敗：" + err.message);
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        window.renderOrdersList = function() {
            const container = document.getElementById('orders-list-container');
            const emptyState = document.getElementById('orders-empty-state');
            container.innerHTML = '';
            
            if(window.orders.length === 0) {
                emptyState.classList.remove('hidden'); emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden'); emptyState.classList.remove('flex');
                
                const grouped = {};
                window.orders.forEach(o => {
                    if (!grouped[o.drinkId]) {
                        grouped[o.drinkId] = { drinkId: o.drinkId, drinkName: o.drinkName, count: 0, ids: [], displayTime: o.displayTime };
                    }
                    grouped[o.drinkId].count++;
                    grouped[o.drinkId].ids.push(o.orderId);
                });

                Object.values(grouped).forEach(group => {
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center bg-white/5 p-3 rounded-lg border border-white/5 hover:bg-white/10 cursor-pointer group transition-all mb-2';
                    item.onclick = () => window.openGroupOrderCheck(group.drinkId); 
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-bar-gray border border-white/10 flex items-center justify-center text-xl shadow-inner font-bold text-bar-gold">
                                x${group.count}
                            </div>
                            <div>
                                <h4 class="text-white font-bold flex items-center gap-2">
                                    ${group.drinkName} 
                                </h4>
                                <p class="text-xs text-gray-500">最新點單: ${group.displayTime}</p>
                            </div>
                        </div>
                        <div class="w-8 h-8 rounded-full border border-gray-600 flex items-center justify-center group-hover:bg-green-500/20 group-hover:border-green-500 transition-all text-gray-500 group-hover:text-green-500">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    `;
                    container.appendChild(item);
                });
            }
        };

        window.updateOrderBadges = function() { 
            const count = window.orders.length; 
            const mainBadge = document.getElementById('order-count-badge-main'); 
            const menuBadge = document.getElementById('order-count-badge-menu'); 
            [mainBadge, menuBadge].forEach(b => { 
                if (b) {
                    b.textContent = count; 
                    if(count > 0) { 
                        b.classList.remove('hidden'); 
                        b.classList.add('animate-bounce'); 
                        setTimeout(()=>b.classList.remove('animate-bounce'), 1000); 
                    } else { 
                        b.classList.add('hidden'); 
                    }
                }
            }); 
        };

        window.clearAllOrders = async function() {
            if (window.orders.length === 0) return;
            const res = await window.customConfirm("確定要清空所有排隊中的酒單嗎？這無法復原！");
            if (!res) return;
            
            const ordersToDelete = [...window.orders];
            window.orders = [];
            window.saveOrders();
            window.renderOrdersList();
            window.updateOrderBadges();
            
            if (window.isCloudConnected) {
                ordersToDelete.forEach(o => {
                    if (o.orderId) {
                        deleteDoc(doc(db, ...basePath, 'orders', o.orderId.toString())).catch(e => console.warn(e));
                    }
                });
            }
            window.showToast("已清空所有點單！");
            window.closeOrdersList();
        };

        window.init = function() {
            let storedDrinks = localStorage.getItem('binbar_data_v1');
            if (!storedDrinks) {
                const oldKeyData = localStorage.getItem('zongbin_drinks_local');
                if (oldKeyData) { storedDrinks = oldKeyData; }
            }
            if (storedDrinks) {
                try {
                    window.drinks = JSON.parse(storedDrinks);
                    if (!Array.isArray(window.drinks)) throw new Error("Format error");
                } catch(e) { window.drinks = []; }
            }
            if (!window.drinks || window.drinks.length === 0) { window.drinks = JSON.parse(JSON.stringify(fullDefaultDrinks)); window.saveData(); }

            const storedCats = localStorage.getItem('binbar_categories_v1');
            if (storedCats) { window.categories = JSON.parse(storedCats); } 
            else { window.categories = JSON.parse(JSON.stringify(defaultCategories)); window.saveCategories(); }

            if (!window.drinks.some(d => d.name === "螺絲起子")) {
                window.drinks = window.drinks.filter(d => d.category !== 'classic');
                const newClassics = fullDefaultDrinks.filter(d => d.category === 'classic');
                window.drinks = [...window.drinks, ...newClassics];
                window.saveData();
            }
            
            if (!window.categories.some(c => c.id === 'classic')) {
                window.categories.splice(1, 0, { id: 'classic', name: '經典調酒' });
                window.saveCategories();
            }

            if (!window.categories.some(c => c.id === 'idiot')) {
                window.categories.push({ id: 'idiot', name: '喝酒吧!笨蛋' });
                window.saveCategories();
                const newIdiotDrinks = fullDefaultDrinks.filter(d => d.category === 'idiot');
                window.drinks = [...window.drinks, ...newIdiotDrinks];
                window.saveData();
            }

            const storedOrders = localStorage.getItem('binbar_orders_v1');
            if(storedOrders) { window.orders = JSON.parse(storedOrders); }

            const storedMade = localStorage.getItem('binbar_made_v1');
            if (storedMade) {
                try { window.madeDrinks = JSON.parse(storedMade); } catch(e) { window.madeDrinks = []; }
            }

            let dataUpdated = false;
            window.drinks.forEach(d => {
                if (d.name && d.name.includes(' (未解鎖)')) {
                    d.name = d.name.replace(' (未解鎖)', '');
                    dataUpdated = true;
                }
                if (d.tags && d.tags.includes('未解鎖')) {
                    d.tags = d.tags.filter(t => t !== '未解鎖');
                    dataUpdated = true;
                }
            });
            if (dataUpdated) window.saveData();

            window.renderFilters();
            window.renderDrinks();
            window.updateOrderBadges();
            window.renderOrdersList();

            window.initCloudSync();
        };

        window.saveData = function() {
            try { localStorage.setItem('binbar_data_v1', JSON.stringify(window.drinks)); window.renderDrinks(); } 
            catch(e) { if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') { window.customAlert('⚠️ 儲存失敗：空間不足！請刪除部分圖片。'); } else { console.error("Save error:", e); window.customAlert('儲存發生錯誤。'); } }
        };
        window.saveCategories = function() { localStorage.setItem('binbar_categories_v1', JSON.stringify(window.categories)); window.renderFilters(); window.renderCategoryEditorList(); };
        window.saveOrders = function() { localStorage.setItem('binbar_orders_v1', JSON.stringify(window.orders)); window.updateOrderBadges(); window.renderOrdersList(); };
        window.saveMadeDrinks = function() { localStorage.setItem('binbar_made_v1', JSON.stringify(window.madeDrinks)); };

        window.renderFilters = function() {
            const container = document.getElementById('filter-container');
            if(!container) return;
            let html = `<button onclick="filterDrinks('all')" class="filter-btn ${window.currentFilter === 'all' ? 'active bg-bar-gold text-bar-dark font-bold' : 'bg-bar-gray text-gray-400 border border-white/10'} px-4 py-2 rounded-lg hover:border-bar-gold transition-colors text-xs md:text-sm whitespace-nowrap">全部</button>`;
            window.categories.forEach(cat => {
                const activeClass = window.currentFilter === cat.id ? 'bg-bar-gold text-bar-dark font-bold' : 'bg-bar-gray text-gray-400 border border-white/10';
                html += `<button onclick="filterDrinks('${cat.id}')" class="filter-btn ${activeClass} px-4 py-2 rounded-lg hover:border-bar-gold transition-colors text-xs md:text-sm whitespace-nowrap">${cat.name}</button>`;
            });
            container.innerHTML = html;
        };

        window.renderDrinks = function() {
            const grid = document.getElementById('drinks-grid');
            if(!grid) return;
            grid.innerHTML = '';
            let filtered = window.currentFilter === 'all' ? window.drinks : window.drinks.filter(d => d.category === window.currentFilter);
            filtered.sort((a, b) => b.id - a.id);
            if (filtered.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10 flex flex-col items-center"><i class="fas fa-glass-whiskey text-4xl mb-3 opacity-30"></i><p>這裡目前空空如也，快去點幾杯來喝吧！</p></div>'; return; }
            filtered.forEach((drink, index) => {
                const card = document.createElement('div');
                
                const isMade = window.madeDrinks.some(id => id == drink.id);
                let cardClass = `drink-card rounded-xl cursor-pointer animate-pop overflow-hidden flex flex-col h-full relative group transition-all duration-300 `;
                if (isMade) {
                    cardClass += `bg-gradient-to-br from-[rgba(212,175,55,0.2)] to-[rgba(0,0,0,0.6)] backdrop-blur-md border border-bar-gold/50 shadow-[0_0_15px_rgba(212,175,55,0.15)]`;
                } else {
                    cardClass += `glass-panel`;
                }
                card.className = cardClass;
                card.style.animationDelay = `${Math.min(index * 50, 500)}ms`;
                card.onclick = () => window.openMenuDetail(drink.id);
                
                let badgeClass = drink.type === 'Shake' ? 'tag-shake' : (['Stir', 'Build'].includes(drink.type) ? 'tag-stir' : 'tag-simple');
                let visualContent = drink.image ? `<img src="${drink.image}" class="card-img-cover" alt="${drink.name}">` : `<div class="flex justify-between items-start mb-3 pt-5 px-5"><span class="tag-pill ${badgeClass}">${drink.type}</span><i class="fas ${drink.icon || 'fa-cocktail'} ${drink.color || 'text-bar-gold'} text-2xl opacity-80"></i></div>`;
                let pillOverlay = drink.image ? `<span class="absolute top-3 left-3 tag-pill ${badgeClass} shadow-md z-10">${drink.type}</span>` : '';
                
                card.innerHTML = `
                    <div class="relative">${pillOverlay}${visualContent}</div>
                    <div class="px-5 pb-5 flex-1 flex flex-col relative">
                        <h3 class="text-xl font-bold text-white mb-1 pr-8 flex items-center">
                            ${drink.name} 
                            ${isMade ? '<i class="fas fa-check-circle text-bar-gold ml-2 text-sm drop-shadow-md" title="已調製"></i>' : ''}
                        </h3>
                        <p class="text-xs text-bar-gold uppercase tracking-wider mb-4 truncate">${drink.engName || drink.base}</p>
                        <div class="flex flex-wrap gap-2 mt-auto">
                            ${(drink.tags || []).map(tag => `<span class="text-xs text-gray-400 bg-black/30 px-2 py-1 rounded border border-white/5">#${tag}</span>`).join('')}
                        </div>
                        <button onclick="event.stopPropagation(); window.placeOrder(${drink.id}, '${drink.name}')" class="absolute bottom-3 right-3 w-10 h-10 bg-white/10 hover:bg-accent-blue hover:text-white rounded-full flex items-center justify-center backdrop-blur-sm transition-all shadow-lg z-20 active:scale-95" title="點這杯">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        window.filterDrinks = function(cat) { window.currentFilter = cat; window.renderFilters(); window.renderDrinks(); };
        
        window.placeOrder = function(drinkId, drinkName) {
            const order = {
                orderId: Date.now() + Math.floor(Math.random() * 1000), 
                drinkId: drinkId,
                drinkName: drinkName,
                ts: Date.now(),
                displayTime: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
            };
            
            window.orders.push(order);
            window.saveOrders();
            window.showToast(`已點單：${drinkName}`);

            if (window.isCloudConnected) {
                setDoc(doc(db, ...basePath, 'orders', order.orderId.toString()), order).catch(e => console.error("Cloud Write Error:", e));
            }
        };

        window.placeOrderFromModal = function() { if(!window.currentViewingId) return; const drink = window.drinks.find(d => d.id === window.currentViewingId); if(drink) { window.placeOrder(drink.id, drink.name); window.closeViewModal(); } };
        
        window.finishGroupOrder = function(drinkId) {
            const orderIndex = window.orders.findIndex(o => o.drinkId == drinkId);
            
            if (orderIndex !== -1) {
                const orderToRemove = window.orders[orderIndex];
                window.orders.splice(orderIndex, 1);
                window.saveOrders();

                if (window.isCloudConnected) {
                    deleteDoc(doc(db, ...basePath, 'orders', orderToRemove.orderId.toString())).catch(e => console.error(e));
                }
                
                if (!window.madeDrinks.some(id => id == drinkId)) {
                    window.madeDrinks.push(drinkId);
                    window.saveMadeDrinks();
                    if (window.isCloudConnected) {
                        setDoc(doc(db, ...basePath, 'meta', 'info'), { madeDrinks: window.madeDrinks }, { merge: true }).catch(e => console.error(e));
                    }
                    window.renderDrinks(); 
                }
                
                const remaining = window.orders.filter(o => o.drinkId == drinkId).length;
                if (remaining === 0) {
                    window.showToast('已全數出單！');
                    window.closeViewModal(); 
                } else {
                    window.showToast(`出單成功！剩餘 ${remaining} 杯`);
                    const btn = document.querySelector('#btn-finish-order');
                    if (btn) btn.innerHTML = `<i class="fas fa-check-circle"></i> 製作完成 (剩 ${remaining})`;
                }
            } else {
                window.closeViewModal();
            }
        };

        window.cancelGroupOrder = function(drinkId) {
            let idx = -1;
            for (let i = window.orders.length - 1; i >= 0; i--) {
                if (window.orders[i].drinkId == drinkId) {
                    idx = i;
                    break;
                }
            }
            
            if (idx !== -1) {
                const orderToRemove = window.orders[idx];
                window.orders.splice(idx, 1);
                window.saveOrders();

                if (window.isCloudConnected && orderToRemove && orderToRemove.orderId) {
                    deleteDoc(doc(db, ...basePath, 'orders', orderToRemove.orderId.toString())).catch(e => console.error(e));
                }
                
                const remaining = window.orders.filter(o => o.drinkId == drinkId).length;
                if (remaining === 0) {
                    window.showToast('已取消該點單！');
                    window.closeViewModal(); 
                } else {
                    window.showToast(`已取消一杯！剩餘 ${remaining} 杯`);
                    const btn = document.querySelector('#btn-finish-order');
                    if (btn) btn.innerHTML = `<i class="fas fa-check-circle"></i> 製作完成 (剩 ${remaining})`;
                }
            } else {
                window.closeViewModal();
            }
        };

        window.openMenuDetail = function(id) { window.currentViewingId = id; const drink = window.drinks.find(d => d.id === id); if(!drink) return; window.updateModalContent(drink); const footer = document.getElementById('view-modal-footer'); footer.innerHTML = `<div class="flex justify-between gap-3 items-center w-full"><div class="flex gap-2"><button onclick="window.confirmDelete()" class="px-3 py-2 rounded-lg border border-red-500/50 text-red-400 hover:bg-red-500/10 text-sm font-bold transition-colors"><i class="fas fa-trash-alt"></i></button><button onclick="window.editCurrentDrink()" class="px-3 py-2 rounded-lg border border-white/10 text-gray-300 hover:bg-white/10 text-sm font-bold transition-colors"><i class="fas fa-pen"></i></button></div><button onclick="window.placeOrderFromModal()" class="flex-1 ml-2 px-4 py-2 rounded-lg bg-accent-blue text-white font-bold hover:bg-blue-400 shadow-lg transition-colors flex items-center justify-center gap-2"><i class="fas fa-plus-circle"></i> 我要點這杯</button></div>`; const m = document.getElementById('view-modal'); m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10); };
        
        window.openGroupOrderCheck = async function(drinkId) {
             const drink = window.drinks.find(d => d.id == drinkId); 
             if (!drink) {
                 const res = await window.customConfirm("原始酒譜已刪除，是否清除此類訂單？");
                 if(res) {
                     const ordersToRemove = window.orders.filter(o => o.drinkId == drinkId);
                     ordersToRemove.forEach(o => {
                         if(window.isCloudConnected) {
                             deleteDoc(doc(db, ...basePath, 'orders', o.orderId.toString())).catch(e=>console.warn(e));
                         }
                     });
                     window.orders = window.orders.filter(o => o.drinkId != drinkId);
                     window.saveOrders();
                 }
                 return;
             }
 
             window.updateModalContent(drink);
 
             const remaining = window.orders.filter(o => o.drinkId == drinkId).length;
             const footer = document.getElementById('view-modal-footer');
             
             footer.innerHTML = `
                 <div class="flex gap-3 w-full">
                     <button onclick="window.cancelGroupOrder('${drinkId}')" class="w-1/3 px-2 py-3 rounded-lg border border-red-500/50 text-red-400 font-bold hover:bg-red-500/10 transition-colors flex items-center justify-center gap-1 text-sm">
                         <i class="fas fa-undo"></i> 取消點單
                     </button>
                     <button id="btn-finish-order" onclick="window.finishGroupOrder('${drinkId}')" class="w-2/3 px-4 py-3 rounded-lg bg-green-600 text-white font-bold hover:bg-green-500 shadow-lg transition-colors flex items-center justify-center gap-2 text-lg animate-pulse">
                         <i class="fas fa-check-circle"></i> 製作完成 (剩 ${remaining})
                     </button>
                 </div>
             `;
 
             window.closeOrdersList(); 
             const m = document.getElementById('view-modal');
             m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10);
        };

        window.updateModalContent = function(drink) { document.getElementById('view-title').textContent = drink.name; const header = document.getElementById('view-header'); if (drink.image) { header.style.backgroundImage = `url('${drink.image}')`; header.classList.remove('bg-gray-800'); } else { header.style.backgroundImage = 'none'; header.classList.add('bg-gray-800'); } document.getElementById('view-ingredients').innerHTML = (drink.ingredients || []).map(ing => `<li class="flex justify-between border-b border-white/5 pb-1"><span>${ing}</span><i class="fas fa-check text-bar-gold/50 text-xs"></i></li>`).join(''); document.getElementById('view-method').textContent = drink.method || ''; document.getElementById('view-highlight').textContent = drink.highlight || ''; };
        window.closeViewModal = function() { const m = document.getElementById('view-modal'); m.classList.add('opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); };

        window.saveDrink = async function() { 
            const name = document.getElementById('inp-name').value.trim(); 
            if(!name) { window.customAlert('請輸入酒名'); return; }
            const catEl = document.querySelector('input[name="cat"]:checked'); 
            if(!catEl) { window.customAlert('請選擇分類'); return; }
            const category = catEl.value; 
            const editId = document.getElementById('edit-id').value; 
            
            let finalImage = window.tempImageBase64;
            if (editId && !finalImage) {
                const existing = window.drinks.find(d => d.id == editId);
                if(existing) finalImage = existing.image;
            }

            const newDrink = { id: editId ? parseInt(editId) : Date.now(), name, engName: document.getElementById('inp-engname').value.trim(), base: document.getElementById('inp-base').value, type: document.getElementById('inp-type').value, category, ingredients: document.getElementById('inp-ingredients').value.split('\n').filter(l=>l.trim()), method: document.getElementById('inp-method').value, highlight: document.getElementById('inp-highlight').value, tags: document.getElementById('inp-tags').value.split(',').map(t=>t.trim()).filter(t=>t), icon: window.selectedIcon, color: window.selectedColor, image: finalImage }; 
            
            if(editId) { 
                const idx = window.drinks.findIndex(d => d.id == editId); 
                if(idx !== -1) window.drinks[idx] = newDrink; 
            } else { 
                window.drinks.push(newDrink); 
            } 
            window.saveData(); 
            
            if (window.isCloudConnected) {
                setDoc(doc(db, ...basePath, 'drinks', newDrink.id.toString()), newDrink).catch(e => console.error(e));
            }
            window.closeEditor(); 
        };
        
        // 新增：防呆刪除保護
        window.confirmDelete = async function() { 
            const pwd = await window.customPrompt('警告：這將永久刪除此調酒！\n請輸入密碼以確認刪除：', '刪除確認', 'password');
            if (pwd === '095219') {
                if(window.currentViewingId) { 
                    window.drinks = window.drinks.filter(d => d.id !== window.currentViewingId); 
                    window.saveData(); 
                    if(window.isCloudConnected) {
                        deleteDoc(doc(db, ...basePath, 'drinks', window.currentViewingId.toString())).catch(e => console.error(e));
                    }
                    window.closeViewModal(); 
                    window.showToast('已成功刪除該調酒！');
                } 
            } else if (pwd !== null) {
                window.customAlert('密碼錯誤，已取消刪除操作。', '錯誤');
            }
        };

        window.addNewCategory = function() { const val = document.getElementById('new-cat-input').value.trim(); if(!val) return; const newCat = { id: 'cat_' + Date.now(), name: val, order: Date.now() }; window.categories.push(newCat); window.saveCategories(); if(window.isCloudConnected) { setDoc(doc(db, ...basePath, 'categories', newCat.id.toString()), newCat); } document.getElementById('new-cat-input').value = ''; };
        window.deleteCategory = async function(id) { 
            if(window.categories.length <= 1) { window.customAlert("請至少保留一個分類"); return; }
            if(await window.customConfirm('確定刪除分類？')) { 
                window.categories = window.categories.filter(c => c.id !== id); 
                window.saveCategories(); 
                if(window.isCloudConnected) { deleteDoc(doc(db, ...basePath, 'categories', id.toString())); } 
            } 
        };

        window.toggleFab = function() { const menu = document.getElementById('fab-menu'); const mainBtn = document.getElementById('fab-main-btn'); const icon = document.getElementById('fab-icon'); window.isFabOpen = !window.isFabOpen; if (window.isFabOpen) { menu.classList.add('fab-menu-open'); mainBtn.classList.add('active'); icon.classList.remove('fa-plus'); icon.classList.add('fa-times'); } else { menu.classList.remove('fab-menu-open'); mainBtn.classList.remove('active'); icon.classList.remove('fa-times'); icon.classList.add('fa-plus'); } };
        window.openOrdersList = function() { window.toggleFab(); document.getElementById('orders-modal').classList.remove('hidden'); setTimeout(() => document.getElementById('orders-modal').classList.remove('opacity-0'), 10); window.renderOrdersList(); };
        window.closeOrdersList = function() { const m = document.getElementById('orders-modal'); m.classList.add('opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); };
        window.openEditor = function(isEdit = false) { if(window.isFabOpen) window.toggleFab(); const titleEl = document.getElementById('editor-title'); const editIdInput = document.getElementById('edit-id'); const imgPreview = document.getElementById('img-preview'); const clearBtn = document.getElementById('clear-img-btn'); document.getElementById('inp-name').value = ''; document.getElementById('inp-engname').value = ''; document.getElementById('inp-ingredients').value = ''; document.getElementById('inp-method').value = ''; document.getElementById('inp-highlight').value = ''; document.getElementById('inp-tags').value = ''; document.getElementById('img-upload').value = ''; window.tempImageBase64 = null; imgPreview.src = ''; imgPreview.classList.add('hidden'); clearBtn.classList.add('hidden'); window.selectedIcon = 'fa-cocktail'; window.selectedColor = 'text-white'; window.renderCategoryEditorList(); if (isEdit && window.currentViewingId) { const drink = window.drinks.find(d => d.id === window.currentViewingId); window.closeViewModal(); titleEl.textContent = '編輯調酒'; editIdInput.value = drink.id; document.getElementById('inp-name').value = drink.name; document.getElementById('inp-engname').value = drink.engName || ''; document.getElementById('inp-base').value = drink.base; document.getElementById('inp-type').value = drink.type; document.getElementById('inp-ingredients').value = (drink.ingredients || []).join('\n'); document.getElementById('inp-method').value = drink.method; document.getElementById('inp-highlight').value = drink.highlight; document.getElementById('inp-tags').value = (drink.tags || []).join(', '); setTimeout(() => { const r = document.querySelector(`input[name="cat"][value="${drink.category}"]`); if(r) r.checked = true; }, 100); window.selectedIcon = drink.icon || 'fa-cocktail'; window.selectedColor = drink.color || 'text-white'; if (drink.image) { window.tempImageBase64 = drink.image; imgPreview.src = drink.image; imgPreview.classList.remove('hidden'); clearBtn.classList.remove('hidden'); } } else { titleEl.textContent = '新增調酒'; editIdInput.value = ''; setTimeout(() => { const r = document.querySelector('input[name="cat"]'); if(r) r.checked = true; }, 100); } window.renderIconSelector(); window.renderColorSelector(); window.updatePreviewIcon(); const m = document.getElementById('editor-modal'); m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10); };
        window.closeEditor = function() { const m = document.getElementById('editor-modal'); m.classList.add('opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); };
        window.editCurrentDrink = function() { window.openEditor(true); };
        window.pickRandom = function() { const d = window.drinks[Math.floor(Math.random() * window.drinks.length)]; if(d) window.openMenuDetail(d.id); };
        window.renderCategoryEditorList = function() { document.getElementById('category-editor-list').innerHTML = window.categories.map(cat => `<div class="flex items-center justify-between bg-white/5 p-2 rounded hover:bg-white/10 group"><label class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 flex-1"><input type="radio" name="cat" value="${cat.id}" class="accent-bar-gold"> ${cat.name}</label><button onclick="window.deleteCategory('${cat.id}')" class="text-gray-500 hover:text-red-400 opacity-30 group-hover:opacity-100 p-1"><i class="fas fa-times"></i></button></div>`).join(''); };
        window.renderIconSelector = function() { document.getElementById('icon-selector').innerHTML = iconList.map(i => `<div class="icon-option ${i === window.selectedIcon ? 'selected' : ''}" onclick="window.selectIcon('${i}')"><i class="fas ${i}"></i></div>`).join(''); };
        window.renderColorSelector = function() { document.getElementById('color-selector').innerHTML = colorList.map(c => `<div class="color-option ${c.c === window.selectedColor ? 'selected' : ''}" style="background-color: ${c.b}" onclick="window.selectColor('${c.c}')"></div>`).join(''); };
        window.selectIcon = function(i) { window.selectedIcon = i; window.renderIconSelector(); window.updatePreviewIcon(); };
        window.selectColor = function(c) { window.selectedColor = c; window.renderColorSelector(); window.updatePreviewIcon(); };
        window.updatePreviewIcon = function() { document.getElementById('preview-icon-display').className = `fas ${window.selectedIcon} text-3xl transition-colors ${window.selectedColor}`; };
        
        window.handleImageUpload = function(input) { 
            if(input.files[0]) { 
                const file = input.files[0]; 
                if(file.size > 500 * 1024) { 
                    window.customAlert("圖片太大囉！請使用小於 500KB 的圖片以免雲端同步失敗。"); 
                    input.value = ''; 
                    return; 
                } 
                const reader = new FileReader(); 
                reader.onload = e => { 
                    window.tempImageBase64 = e.target.result; 
                    document.getElementById('img-preview').src = window.tempImageBase64; 
                    document.getElementById('img-preview').classList.remove('hidden'); 
                    document.getElementById('clear-img-btn').classList.remove('hidden'); 
                }; 
                reader.readAsDataURL(file); 
            } 
        };
        window.clearImage = function() { window.tempImageBase64 = null; document.getElementById('img-upload').value=''; document.getElementById('img-preview').classList.add('hidden'); document.getElementById('clear-img-btn').classList.add('hidden'); };
        window.showToast = function(msg, timeout=3000) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'show'; setTimeout(() => t.className = '', timeout); };
        
        window.init();
    </script>
</body>
</html>
